__include__: [
  '../dataset/coco_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/rtdetrv2_r50vd.yml',
]

output_dir: ./output/rtdetrv2_r50vd_m_6x_coco

RTDETR: 
  backbone: PResNet
  encoder: TemporalFusionEncoder
  decoder: TemporalTransformer

TemporalFusionEncoder:
  expansion: 0.5
  batch_size: 4
  num_encoder_layers: 1
  num_refs: 3

# HybridEncoder:
#   expansion: 0.5
#   num_encoder_layers: 1

TemporalTransformer:
  eval_idx: 2 # use 3th decoder layer to eval
  batch_size: 4
  num_refs: 3
  # learn_query_content: True


epoches: 12

optimizer:
  type: AdamW
  params: 
    - 
      params: '^(?=.*backbone)(?!.*norm).*$'
      lr: 0.00001
    - 
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001


train_multi_dataloader: 
  dataset: 
    transforms:
      policy:
        epoch: 11
  collate_fn:
    stop_epoch: 11
  total_batch_size: 4
