__include__: [
  '../dataset/coco_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/transutd_r50vd_vid.yml',
]

output_dir: ./output/rtdetrv2_r50vd_6x_coco



optimizer:
  type: AdamW
  params: 
    - 
      params: '^(?=.*backbone)(?!.*norm).*$'
      lr: 0.00001
    - 
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001

train_multi_dataloader: 
  dataset: 
    transforms:
      policy:
        epoch: 4
  collate_fn:
    stop_epoch: 4
  total_batch_size: 4

